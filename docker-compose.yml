services:
  web:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: idea
    ports:
      - "${IDEA_WEB_HOST_PORT:-8002}:8001" # so that we can have SEA and IDEA on the same machine
    env_file:
      - .env
    volumes:
      - idea_persistent_data:/app/data
      - ./.codex:/app/.codex # CODEX_HOME: for Codex CLI authentication, config, and agent working agreements
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOCAL_DEV=0
      - PQA_HOME=/app/data
      - PROMPT_DIRECTORY=/app/data/prompts
      - CODEX_HOME=/app/.codex
    command: uvicorn app:app --host 0.0.0.0 --port 8001
    depends_on:
      - redis
      - db

  db:
    image: pgvector/pgvector:pg17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}

  redis:
    image: redis:alpine
    ports:
      - "${IDEA_REDIS_HOST_PORT:-6380}:6379" # so that we can have SEA and IDEA on the same machine
    volumes:
      - idea_redis_data:/data
    command: redis-server --appendonly yes

  langfuse-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
      - POSTGRES_USER=langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      retries: 5
      start_period: 20s
      timeout: 5s

  langfuse:
    image: langfuse/langfuse:2
    platform: linux/amd64
    ports:
      - "${LANGFUSE_HOST_PORT:-3001}:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_SALT}
      - SALT=${LANGFUSE_SALT}
      - NEXTAUTH_URL=http://localhost:3001
      - TELEMETRY_ENABLED=false
      - LANGFUSE_INIT_ORG_ID=neolab
      - LANGFUSE_INIT_ORG_NAME=NeoLab
      - LANGFUSE_INIT_PROJECT_ID=copepodes
      - LANGFUSE_INIT_PROJECT_NAME=assistant-copepodes
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_SECRET_KEY}
    depends_on:
      langfuse-db:
        condition: service_healthy

volumes:
  idea_persistent_data:
  idea_redis_data:
  app-db-data:
  langfuse-db-data:
