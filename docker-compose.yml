services:
  copepod-agent:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/tidianecisse777/copepod-agent:latest
    container_name: copepod_agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OPENWEBUI_URL=http://open-webui:8080
    command: uvicorn serve:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - copepod_data:/app/data
      - copepod_logs:/app/logs
      - copepod_static:/app/static
      - copepod_models:/app/models
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 30s
      retries: 3
      start_period: 60s

  open-webui:
    image: openwebui/open-webui:0.9.6
    container_name: open_webui
    ports:
      - "3000:8080"
    environment:
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - OPENAI_API_KEY=copepod-key
      # Désactive le pipeline RAG d'OpenWebUI : on injecte nous-mêmes les fichiers
      # via resolve_request_files → load_file dans l'agent. Court-circuite chunking,
      # embeddings et vector store au moment de l'upload (retrieval.py:1696).
      - BYPASS_EMBEDDING_AND_RETRIEVAL=true
      # Embeddings/RAG_* conservés en filet de sécurité au cas où OpenWebUI rappelle
      # via un autre code path — le dummy endpoint /v1/embeddings retourne du zéro instant.
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - RAG_OPENAI_API_KEY=copepod-key
      - RAG_EMBEDDING_MODEL=copepod-embeddings
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      copepod-agent:
        condition: service_healthy
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - DOCKER_API_VERSION=1.44
    command: copepod_agent
    restart: unless-stopped

volumes:
  copepod_data:
  copepod_logs:
  copepod_static:
  copepod_models:
  open_webui_data:
