services:
  postgres:
    image: postgres:16-alpine
    container_name: copepod_postgres
    environment:
      POSTGRES_DB: copepod_sessions
      POSTGRES_USER: copepod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-copepod_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copepod -d copepod_sessions"]
      interval: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  copepod-agent:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/tidianecisse777/copepod-agent:latest
    pull_policy: always
    container_name: copepod_agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OPENWEBUI_URL=http://open-webui:8080
      - OPENWEBUI_DATA_DIR=/owui-data
      - SESSION_STORE_DATABASE_URL=postgresql+psycopg://copepod:${POSTGRES_PASSWORD:-copepod_dev}@postgres:5432/copepod_sessions
      - SERVE_BASE_URL=${SERVE_BASE_URL:-http://localhost:8000}
      - DATABASE_URL=${DATABASE_URL:-}
    command: uvicorn serve:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - ./data:/app/data
      - copepod_logs:/app/logs
      - copepod_static:/app/static
      - copepod_models:/app/models
      # Keep the image-baked RAG index visible at runtime. Without this
      # named volume, the `.:/app` bind mount above would shadow
      # `core/copepod_rag/chroma_db` (gitignored, so absent on fresh
      # clones) and the RAG queries would return an empty collection.
      - copepod_rag_index:/app/core/copepod_rag/chroma_db
      - open_webui_data:/owui-data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 30s
      retries: 3
      start_period: 60s

  mcp-ecotaxa:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: ghcr.io/tidianecisse777/mcp-ecotaxa:latest
    pull_policy: missing
    container_name: mcp_ecotaxa
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - ECOTAXA_TOKEN=${ECOTAXA_TOKEN:-}
      - ECOTAXA_USERNAME=${ECOTAXA_USERNAME:-}
      - ECOTAXA_PASSWORD=${ECOTAXA_PASSWORD:-}
    command: uvicorn core.mcp.ecotaxa_server:create_app --factory --host 0.0.0.0 --port 8001 --reload
    volumes:
      - .:/app
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      retries: 3
      start_period: 30s

  open-webui:
    image: openwebui/open-webui:0.9.6
    container_name: open_webui
    ports:
      - "3000:8080"
    environment:
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
      - OPENAI_API_BASE_URL=${OPENWEBUI_AGENT_BASE_URL:-http://copepod-agent:8000/v1}
      - OPENAI_API_KEY=copepod-key
      - BYPASS_EMBEDDING_AND_RETRIEVAL=true
      # [query] → OpenWebUI injecte le message original à la place du template RAG
      # ("### Task:..."). Sans ça, _is_internal_prompt filtre silencieusement tous les
      # messages avec fichier attaché et l'agent ne répond jamais.
      - RAG_TEMPLATE=[query]
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=${OPENWEBUI_AGENT_BASE_URL:-http://copepod-agent:8000/v1}
      - RAG_OPENAI_API_KEY=copepod-key
      - RAG_EMBEDDING_MODEL=copepod-embeddings
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - DOCKER_API_VERSION=1.44
    command: copepod_agent
    restart: unless-stopped

volumes:
  copepod_logs:
  copepod_static:
  copepod_models:
  copepod_rag_index:
  open_webui_data:
  postgres_data:
