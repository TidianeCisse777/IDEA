<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEA- Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page theme-light">
    <script>
        (function () {
            const THEME_STORAGE_KEY = 'idea-theme';
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add('theme-light');
            try {
                localStorage.setItem(THEME_STORAGE_KEY, 'light');
            } catch (error) {
                console.warn('Unable to persist theme preference:', error);
            }
        })();
    </script>
    <div class="login-container">
        <div class="login-header">
            <h1>IDEA</h1>
            <p>Intelligent Data Exploring Assistant</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required 
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="login-button" id="loginButton">
                Sign In
            </button>
            <button type="button" class="login-button guest-login-button" id="guestLoginButton">
                Continue as Guest
            </button>
        </form>

        <div class="footer-text">
            Need an account? Email <a href="mailto:idea-dev-grp@hawaii.edu">idea-dev-grp@hawaii.edu</a>.
            <a href="https://github.com/uhsealevelcenter/IDEA" target="_blank" rel="noopener">More info on GitHub</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginButton = document.getElementById('loginButton');
        const guestLoginButton = document.getElementById('guestLoginButton');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const GUEST_NOTICE_STORAGE_KEY = 'idea-guest-notice';
        const LOGIN_MESSAGE_STORAGE_KEY = 'idea-login-message';

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        function consumeLoginMessage() {
            const rawValue = localStorage.getItem(LOGIN_MESSAGE_STORAGE_KEY);
            if (!rawValue) return null;
            localStorage.removeItem(LOGIN_MESSAGE_STORAGE_KEY);
            try {
                return JSON.parse(rawValue);
            } catch (error) {
                console.warn('Unable to parse saved login message:', error);
                return null;
            }
        }

        function persistGuestNotice(data) {
            if (!data?.is_guest) {
                localStorage.removeItem(GUEST_NOTICE_STORAGE_KEY);
                return;
            }

            localStorage.setItem(GUEST_NOTICE_STORAGE_KEY, JSON.stringify({
                expiresAt: data.guest_expires_at || null,
                expiresInMinutes: data.guest_expires_in_minutes || null,
                dismissed: false
            }));
        }

        function setButtonsDisabled(disabled, activeLabel = null) {
            loginButton.disabled = disabled;
            guestLoginButton.disabled = disabled;
            loginButton.textContent = activeLabel === 'login' ? 'Signing in...' : 'Sign In';
            guestLoginButton.textContent = activeLabel === 'guest' ? 'Creating guest session...' : 'Continue as Guest';
        }

        function getGuestLoginEndpoint() {
            const endpoints = config.getEndpoints();
            if (endpoints.guestLogin) {
                return endpoints.guestLogin;
            }
            return endpoints.login.replace(/\/login\/?$/, '/guest-login');
        }

        function completeLogin(data) {
            localStorage.setItem('authToken', data.token);
            persistGuestNotice(data);

            showSuccess(data.message || 'Login successful! Redirecting...');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            setButtonsDisabled(true, 'login');

            try {
                const response = await fetch(config.getEndpoints().login, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    completeLogin(data);
                } else {
                    showError(data.detail || 'Invalid username or password');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Login failed. Please check your connection and try again.');
            } finally {
                setButtonsDisabled(false);
            }
        });

        guestLoginButton.addEventListener('click', async () => {
            hideMessages();
            setButtonsDisabled(true, 'guest');

            try {
                const response = await fetch(getGuestLoginEndpoint(), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    completeLogin(data);
                } else {
                    showError(data.detail || 'Unable to create a guest session right now.');
                }
            } catch (error) {
                console.error('Guest login error:', error);
                showError('Guest login failed. Please check your connection and try again or contact us at the email address below.');
            } finally {
                setButtonsDisabled(false);
            }
        });

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', async () => {
            const savedMessage = consumeLoginMessage();
            if (savedMessage?.message) {
                if (savedMessage.type === 'error') {
                    showError(savedMessage.message);
                } else {
                    showSuccess(savedMessage.message);
                }
            }

            const token = localStorage.getItem('authToken');
            if (token) {
                try {
                    const response = await fetch(config.getEndpoints().verify, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        // User is already authenticated, redirect to main app
                        window.location.href = 'index.html';
                    } else {
                        // Token is invalid, remove it
                        localStorage.removeItem('authToken');
                    }
                } catch (error) {
                    console.error('Auth verification error:', error);
                    localStorage.removeItem('authToken');
                }
            }
        });
    </script>
</body>
</html>
