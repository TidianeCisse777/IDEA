# Compose prod — provider-agnostic.
# Pas de bind-mount du code (l'image est la source de vérité), pas de --reload,
# ports services internes liés à 127.0.0.1, Caddy seul ouvert sur 80/443.
# Domaine et email TLS pilotés par .env (PROD_DOMAIN, PROD_TLS_EMAIL).
#
# Lancer : docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: copepod_postgres
    environment:
      POSTGRES_DB: copepod_sessions
      POSTGRES_USER: copepod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis en prod}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copepod -d copepod_sessions"]
      interval: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  copepod-agent:
    image: ghcr.io/tidianecisse777/copepod-agent:latest
    pull_policy: always
    container_name: copepod_agent
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - OPENWEBUI_URL=http://open-webui:8080
      - OPENWEBUI_DATA_DIR=/owui-data
      - SESSION_STORE_DATABASE_URL=postgresql+psycopg://copepod:${POSTGRES_PASSWORD}@postgres:5432/copepod_sessions
      - SERVE_BASE_URL=${SERVE_BASE_URL:-https://${PROD_DOMAIN}}
      - DATABASE_URL=${DATABASE_URL:-}
    command: uvicorn serve:app --host 0.0.0.0 --port 8000
    volumes:
      - copepod_data:/app/data
      - copepod_logs:/app/logs
      - copepod_static:/app/static
      - copepod_models:/app/models
      - open_webui_data:/owui-data:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 30s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mcp-ecotaxa:
    image: ghcr.io/tidianecisse777/mcp-ecotaxa:latest
    pull_policy: always
    container_name: mcp_ecotaxa
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - ECOTAXA_TOKEN=${ECOTAXA_TOKEN:-}
      - ECOTAXA_USERNAME=${ECOTAXA_USERNAME:-}
      - ECOTAXA_PASSWORD=${ECOTAXA_PASSWORD:-}
    command: uvicorn core.mcp.ecotaxa_server:create_app --factory --host 0.0.0.0 --port 8001
    volumes:
      - copepod_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  open-webui:
    image: openwebui/open-webui:0.9.6
    container_name: open_webui
    # Pas de port exposé : Caddy reverse-proxy via le réseau Docker interne.
    environment:
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
      - OPENAI_API_BASE_URL=http://copepod-agent:8000/v1
      - OPENAI_API_KEY=copepod-key
      - BYPASS_EMBEDDING_AND_RETRIEVAL=true
      - RAG_TEMPLATE=[query]
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_OPENAI_API_BASE_URL=http://copepod-agent:8000/v1
      - RAG_OPENAI_API_KEY=copepod-key
      - RAG_EMBEDDING_MODEL=copepod-embeddings
      # Hardening prod : inscription désactivée, nouveaux comptes en attente d'approbation.
      - ENABLE_SIGNUP=false
      - DEFAULT_USER_ROLE=pending
      - WEBUI_AUTH=true
      - WEBUI_URL=https://${PROD_DOMAIN}
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - PROD_DOMAIN=${PROD_DOMAIN:?PROD_DOMAIN requis en prod}
      - PROD_TLS_EMAIL=${PROD_TLS_EMAIL:?PROD_TLS_EMAIL requis en prod}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - open-webui
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  copepod_data:
  copepod_logs:
  copepod_static:
  copepod_models:
  open_webui_data:
  postgres_data:
  caddy_data:
  caddy_config:
