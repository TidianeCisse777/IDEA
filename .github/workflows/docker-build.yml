name: Build & push copepod-agent

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "Dockerfile"
      - "agents/skills/**.md"
      - ".github/workflows/docker-build.yml"

concurrency:
  group: copepod-agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER }}/copepod-agent:latest
          cache-to: type=inline
          tags: |
            ghcr.io/${{ env.OWNER }}/copepod-agent:latest
            ghcr.io/${{ env.OWNER }}/copepod-agent:${{ github.sha }}
