name: Build & push copepod-agent

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "Dockerfile"
      - "agents/skills/**.md"
      - ".github/workflows/docker-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/copepod-agent:latest
            ghcr.io/${{ env.OWNER }}/copepod-agent:${{ github.sha }}

  push-langsmith:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install LangSmith deps
        run: pip install langsmith langchain-core

      - name: Push prompt + skills to LangSmith Hub
        env:
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path
          from langsmith import Client
          from langsmith.utils import LangSmithConflictError
          from langsmith.schemas import FileEntry
          from langchain_core.prompts import ChatPromptTemplate

          sys.path.insert(0, ".")
          from agents.copepod_system_prompt import COPEPOD_SYSTEM_PROMPT

          c = Client()

          try:
              prompt = ChatPromptTemplate.from_messages([("system", COPEPOD_SYSTEM_PROMPT)])
              c.push_prompt("copepod-system-prompt", object=prompt, is_public=False)
              print("✓ copepod-system-prompt pushed")
          except LangSmithConflictError:
              print("~ copepod-system-prompt unchanged, skipped")

          for skill_file in sorted(Path("agents/skills").glob("*.md")):
              name = f"copepod-{skill_file.stem.replace('_', '-')}"
              content = skill_file.read_text()
              try:
                  c.push_skill(name, files={"SKILL.md": FileEntry(type="file", content=content)}, is_public=False)
                  print(f"✓ {name} pushed")
              except LangSmithConflictError:
                  print(f"~ {name} unchanged, skipped")
          EOF
