# LiteLLM proxy configuration reference:
# https://docs.litellm.ai/docs/proxy/config_settings
#
# Values pulled from the environment use os.environ/VAR_NAME below.

model_list:
  - model_name: gpt-5.5-2026-04-23
    litellm_params:
      model: openai/gpt-5.5-2026-04-23
      api_base: https://api.openai.com/v1
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat

  - model_name: openai/gpt-5-mini-2025-08-07
    litellm_params:
      model: openai/gpt-5-mini-2025-08-07
      api_base: https://api.openai.com/v1
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat

  - model_name: openai/gpt-5.2-2025-12-11
    litellm_params:
      model: openai/gpt-5.2-2025-12-11
      api_base: https://api.openai.com/v1
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: chat

  - model_name: gpt-4o-mini-transcribe
    litellm_params:
      model: openai/gpt-4o-mini-transcribe
      api_base: https://api.openai.com/v1
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: audio_transcription

general_settings:

  # Admin secret used to manage the proxy (UI admin, key management APIs). Not the Azure/Databricks keys.
  master_key: os.environ/LITELLM_MASTER_KEY

  # Postgres URL for virtual keys, teams, spend logs, etc.
  # Set via LITELLM_DATABASE_URL in docker-compose; points at the shared db service with schema=litellm.
  database_url: os.environ/LITELLM_DATABASE_URL

  # When true, LiteLLM does not send the master key back through API surfaces such as GET /user/info
  # (avoids re-displaying the secret in the admin UI / responses after initial setup).
  disable_master_key_return: true

  # When false (explicit): if the DB is unreachable, the proxy does not fall back to "best effort"
  # traffic without normal DB-backed checks. We keep spend tracking, virtual-key validation, and
  # attribution intact rather than risking untracked LLM calls during outages.
  allow_requests_on_db_unavailable: false

  # When true, LiteLLM may persist prompts and completions in the spend-logs path (DB). Users accept this.
  store_prompts_in_spend_logs: true

  # --- Abuse / capacity guardrails (request body size, response size, concurrency) ---
  max_response_size_mb: 32
  max_parallel_requests: 50
  global_max_parallel_requests: 250

  # --- Health checks vs cost (see https://docs.litellm.ai/docs/proxy/health) ---
  #
  # There are two different ideas people call "health":
  #
  # 1) Cheap probes (good for load balancers): endpoints such as liveness/readiness only check that
  #    the process is up and dependencies like the DB respond. They do not call upstream models.
  #
  # 2) Model / "deep" health: /health and background_health_checks exercise real model routes —
  #    those requests look like normal API traffic to the provider (tokens billed).
  #
  # Until traffic/cost is understood, background checks stay commented; use liveness/readiness for ops.
  # background_health_checks: true
  # health_check_interval: 600
  # health_check_details: false


litellm_settings:
  # Structured logs (one JSON object per line) for log analytics ingestion.
  json_logs: true

  # Seconds: abort an upstream LLM HTTP call if it runs longer than this.
  request_timeout: 240

  # Redact virtual-key / team identifiers from supported logging callbacks.
  redact_user_api_key_info: true

  cache: true
  cache_params:
    type: redis
    # Internal Docker service hostname — no auth or SSL on the project's Redis container.
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    ttl: 3600
